server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Resolves the "local"/"public" backend service names below at request
    # time via Docker's embedded DNS (127.0.0.11 on any container-default or
    # user-defined bridge network), rather than nginx's normal behavior of
    # resolving a proxy_pass hostname once at startup and caching that IP
    # forever. Without this, an unrelated restart of the backend containers
    # (they have restart: unless-stopped, so this isn't rare) could leave
    # this container proxying to a stale, dead IP until it was itself
    # restarted or reloaded.
    resolver 127.0.0.11 valid=30s;

    # Basic hardening headers. Content-Security-Policy is deliberately not
    # set here: this app talks to configurable, per-deployment API and
    # Keycloak origins (VITE_PUBLIC_API_URL/VITE_ADMIN_API_URL/
    # VITE_KEYCLOAK_URL), so a correct CSP has to be assembled from those
    # same values rather than hardcoded into a static nginx config that
    # doesn't know them.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Internal reverse-proxies to the two backend services (compose service
    # names "local"/"public", see docker-compose.yml -- this container must
    # be on the same Docker network as them for these names to resolve).
    # Lets an external reverse proxy (e.g. Nginx Proxy Manager) point at this
    # one frontend service for everything, instead of needing its own
    # per-path routing rules to reach the backend directly. Only meaningful
    # once VITE_ADMIN_API_URL/VITE_PUBLIC_API_URL are actually set to these
    # same prefixes at build time -- see webapp-banner-tool/Dockerfile.

    # /admin-api/* strips that prefix and forwards to the local app's real
    # routes (e.g. /admin-api/images-local/channels -> local:3001/images-local/channels).
    # The rewrite (rather than relying on proxy_pass's own prefix-replacement
    # shorthand) is required here specifically because proxy_pass's target
    # is a variable (for the runtime DNS re-resolution above): nginx does not
    # apply its usual "replace the matched location prefix" behavior when the
    # proxy_pass target contains a variable, so without this the entire
    # remainder of the path would silently be dropped instead of forwarded.
    # Verified empirically against a real container, not assumed from docs.
    location /admin-api/ {
        set $upstream_local http://local:3001;
        rewrite ^/admin-api/(.*)$ /$1 break;
        proxy_pass $upstream_local;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /images/* is forwarded as-is (no prefix stripped): the public app's
    # real routes already live at /images/:channelName, so this prefix
    # matches exactly.
    location /images/ {
        set $upstream_public http://public:3000;
        proxy_pass $upstream_public;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Client-side routing (react-router-dom): any path that isn't an actual
    # static file falls back to index.html, which then handles routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed asset filenames (Vite's default build output) are safe to cache
    # indefinitely; index.html itself must not be cached, since it's the one
    # file that has to be re-fetched to pick up a new deployment.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
