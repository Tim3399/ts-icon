server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Basic hardening headers. Content-Security-Policy is deliberately not
    # set here: this app talks to configurable, per-deployment API and
    # Keycloak origins (VITE_PUBLIC_API_URL/VITE_ADMIN_API_URL/
    # VITE_KEYCLOAK_URL), so a correct CSP has to be assembled from those
    # same values rather than hardcoded into a static nginx config that
    # doesn't know them.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Client-side routing (react-router-dom): any path that isn't an actual
    # static file falls back to index.html, which then handles routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed asset filenames (Vite's default build output) are safe to cache
    # indefinitely; index.html itself must not be cached, since it's the one
    # file that has to be re-fetched to pick up a new deployment.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
