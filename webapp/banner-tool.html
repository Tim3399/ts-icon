<!DOCTYPE html>
<html lang="de">
<script src="banner-tool-config.js"></script>
<head>
  <meta charset="UTF-8" />
  <title>TS5 Banner Tool</title>
  <link href="https://cdn.jsdelivr.net/npm/cropperjs@1.5.13/dist/cropper.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="banner-tool.css" />
</head>
<body>

  <h1>TS5 Banner Generator (500×22)</h1>

  <label for="channel">Channelname:</label>
  <input type="text" id="channel" placeholder="lobby" required />

  <input type="file" id="fileInput" accept="image/*" />

  <label for="imageUrl">Bild-URL:</label>
  <input type="text" id="imageUrl" placeholder="https://example.com/banner.png" />
  <button id="loadUrlBtn">Bild von URL laden</button>

  <div id="crop-container">
    <img id="preview" alt="Vorschau" />
  </div>

  <canvas id="canvas-preview" width="500" height="22" style="display: none;"></canvas>

  <button id="uploadBtn">Bild zuschneiden & senden</button>

  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.5.13/dist/cropper.min.js"></script>
  <script>
    const TARGET_WIDTH = 500;
    const TARGET_HEIGHT = 44;
    const TARGET_RATIO = TARGET_WIDTH / TARGET_HEIGHT;

    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const canvas = document.getElementById('canvas-preview');
    const uploadBtn = document.getElementById('uploadBtn');
    const channelInput = document.getElementById('channel');
    const loadUrlBtn = document.getElementById('loadUrlBtn');
    const imageUrlInput = document.getElementById('imageUrl');

    let cropper;

    function initCropper() {
    if (cropper) cropper.destroy();
    cropper = new Cropper(preview, {
      aspectRatio: TARGET_RATIO,
      viewMode: 1,
      autoCropArea: 1,
      dragMode: 'move',
      cropBoxResizable: false,
      ready() {
        // Setze CropBox auf maximal mögliche Größe im Seitenverhältnis
        const imageData = cropper.getImageData();
        let cropBoxWidth = imageData.naturalWidth;
        let cropBoxHeight = cropBoxWidth / TARGET_RATIO;
        if (cropBoxHeight > imageData.naturalHeight) {
          cropBoxHeight = imageData.naturalHeight;
          cropBoxWidth = cropBoxHeight * TARGET_RATIO;
        }
        cropper.setCropBoxData({
          width: cropBoxWidth,
          height: cropBoxHeight,
          left: (imageData.width - cropBoxWidth) / 2,
          top: (imageData.height - cropBoxHeight) / 2,
        });
      }
    });
  }

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        preview.src = reader.result;
        preview.style.display = 'block';
        initCropper();
      };
      reader.readAsDataURL(file);
    });

    loadUrlBtn.addEventListener('click', async () => {
      const url = imageUrlInput.value.trim();
      if (!url) return alert('Bitte eine Bild-URL eingeben.');

      try {
        const response = await fetch(`${GET_IMAGE_URL}?url=${encodeURIComponent(url)}`);
        if (!response.ok) throw new Error('Bild konnte nicht geladen werden');
        const blob = await response.blob();
        const objectURL = URL.createObjectURL(blob);

        preview.src = objectURL;
        preview.style.display = 'block';
        initCropper();
      } catch (err) {
        alert('Fehler beim Laden des Bildes: ' + err.message);
      }
    });

    uploadBtn.addEventListener('click', () => {
      if (!cropper) return alert('Bitte zuerst ein Bild auswählen.');
      const channelName = channelInput.value.trim();
      if (!channelName) return alert('Bitte einen Channelnamen eingeben.');

    // Hole den maximalen Crop in Originalauflösung
    const cropData = cropper.getData(true);
    const imageData = cropper.getImageData();
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = cropData.width;
    tempCanvas.height = cropData.height;
    const ctx = tempCanvas.getContext('2d');
    ctx.drawImage(
      preview,
      cropData.x, cropData.y, cropData.width, cropData.height,
      0, 0, cropData.width, cropData.height
    );

    // Vorschau bleibt 500x44
    canvas.width = TARGET_WIDTH;
    canvas.height = TARGET_HEIGHT;
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    canvas.getContext('2d').drawImage(tempCanvas, 0, 0, TARGET_WIDTH, TARGET_HEIGHT);
    canvas.style.display = 'block';

    // Speichere das Bild in maximaler Qualität (Original-Crop)
    tempCanvas.toBlob((blob) => {
      const formData = new FormData();
      formData.append('file', blob, 'banner.png');

        fetch(`${API_URL}${encodeURIComponent(channelName)}`, {
          method: 'POST',
          body: formData
        })
        .then(res => {
          if (!res.ok) throw new Error('Fehler beim Upload');
          return res.json();
        })
        .then(data => alert('Bild erfolgreich hochgeladen!'))
        .catch(err => alert('Fehler: ' + err.message));
      }, 'image/png');
    });
  </script>
</body>
</html>
