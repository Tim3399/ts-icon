name: CI

# CI only: install, lint, typecheck, build, test for both apps. Deliberately
# does not include Docker image build/push or deployment — those need
# registry/host secrets that aren't configured yet.
on: [push, pull_request]

# Cancel superseded runs on the same branch/PR so we don't burn minutes on
# stale commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint, typecheck, build, test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Hardcoded rather than node-version-file to avoid any ambiguity
          # about path resolution across jobs with different working
          # directories (see the frontend job). Keep in sync with the
          # root .nvmrc (currently pinned to 22).
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # The generated Prisma client (node_modules/.prisma/client) isn't
      # committed and nothing currently regenerates it automatically on
      # `npm ci`. Without this step, PrismaClient resolves to an untyped
      # value under the project's type-aware ESLint config, which turns
      # ordinary Prisma usage into spurious "unsafe" lint errors.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # There are currently no unit test files in src/, and Jest's default
      # behavior is to exit non-zero ("No tests found") in that case, which
      # would make this step permanently red before any tests exist.
      # --passWithNoTests keeps it green until real spec files are added, at
      # which point it starts exercising them automatically with no
      # workflow change needed.
      - name: Unit tests
        run: npm test -- --passWithNoTests

      # test/app.e2e-spec.ts is intentionally not run here: it currently
      # fails deterministically, not flakily. It expects `GET /` to return
      # 200 "Hello World!", but that route no longer exists in the app
      # module under test. More fundamentally, app initialization itself
      # throws first — the Prisma service's onModuleInit() tries to connect
      # to a SQLite file that doesn't exist in a fresh checkout, so the test
      # never even reaches its HTTP assertion. Re-enable this step once the
      # spec is rewritten against real routes and the test run provisions
      # its own database (e.g. via a migration step before the test):
      # - name: E2E tests
      #   run: npm run test:e2e

  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp-banner-tool
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # See the comment in the backend job — hardcoded to match the
          # root .nvmrc (22) rather than node-version-file, since this job's
          # working directory is one level below the repo root where
          # .nvmrc lives and setup-node's path resolution for
          # node-version-file in that situation isn't worth relying on.
          node-version: 22
          cache: npm
          cache-dependency-path: webapp-banner-tool/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
