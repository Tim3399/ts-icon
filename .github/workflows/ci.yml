name: CI

# CI: install, lint, typecheck, build, test for both apps, plus a
# build-only Docker image validation job. Deliberately does not include
# pushing an image anywhere or deployment — those need registry/host
# secrets that aren't configured yet.
on: [push, pull_request]

# Cancel superseded runs on the same branch/PR so we don't burn minutes on
# stale commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint, typecheck, build, test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Hardcoded rather than node-version-file to avoid any ambiguity
          # about path resolution across jobs with different working
          # directories (see the frontend job). Keep in sync with the
          # root .nvmrc (currently pinned to 22).
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # The generated Prisma client (node_modules/.prisma/client) isn't
      # committed and nothing currently regenerates it automatically on
      # `npm ci`. Without this step, PrismaClient resolves to an untyped
      # value under the project's type-aware ESLint config, which turns
      # ordinary Prisma usage into spurious "unsafe" lint errors.
      #
      # DATABASE_URL is set here even though `generate` never connects to a
      # database: prisma.config.ts resolves it via env() as soon as the
      # Prisma CLI loads its config, for any command, so a value must be
      # present regardless of whether this specific command needs one.
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: file:./dev.db

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # There are currently no unit test files in src/, and Jest's default
      # behavior is to exit non-zero ("No tests found") in that case, which
      # would make this step permanently red before any tests exist.
      # --passWithNoTests keeps it green until real spec files are added, at
      # which point it starts exercising them automatically with no
      # workflow change needed.
      - name: Unit tests
        run: npm test -- --passWithNoTests

      # Rewritten against real routes (a public health check, and a
      # protected route confirmed to reject an unauthenticated request).
      # Neither touches the database, so this runs safely against a fresh
      # checkout with no pre-existing SQLite file or migration step needed -
      # better-sqlite3 creates an empty file on connect, which is enough
      # since nothing here queries a table.
      - name: E2E tests
        run: npm run test:e2e

  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp-banner-tool
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # See the comment in the backend job — hardcoded to match the
          # root .nvmrc (22) rather than node-version-file, since this job's
          # working directory is one level below the repo root where
          # .nvmrc lives and setup-node's path resolution for
          # node-version-file in that situation isn't worth relying on.
          node-version: 22
          cache: npm
          cache-dependency-path: webapp-banner-tool/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

  docker-build:
    name: Docker image build (validation only, no push)
    runs-on: ubuntu-latest
    # Independent of the backend/frontend jobs above: a Dockerfile mistake
    # (missing file in the build context, broken RUN step, wrong stage
    # reference, etc.) is a different failure mode than lint/typecheck/test
    # and previously wasn't caught by CI at all. No registry credentials are
    # needed since nothing here is pushed anywhere.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Builds the Dockerfile's final stage ("runner"), i.e. exactly what
      # `docker build .` produces without `--target` — the image that
      # actually ships. This is the build most likely to break in practice
      # (e.g. a bad COPY path, a runtime-stage dependency that's missing
      # after `npm ci --omit=dev`), so it's validated first.
      - name: Build default (runner) stage
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha,scope=docker-runner
          cache-to: type=gha,mode=max,scope=docker-runner

      # Also validates the "builder" stage on its own (the stage the
      # docker-compose "migrate" one-off service builds from, since it's the
      # only stage with the Prisma CLI available). Cheap extra coverage
      # given the layer cache above is mostly shared with it.
      - name: Build builder stage
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          push: false
          cache-from: type=gha,scope=docker-builder
          cache-to: type=gha,mode=max,scope=docker-builder
